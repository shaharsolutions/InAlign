name: Deploy LMS to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'LMS/**'
      - '.github/workflows/deploy-lms-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: LMS/package-lock.json
      - uses: actions/configure-pages@v5
      - run: npm ci
        working-directory: LMS
      - run: npm run test
        working-directory: LMS
      - run: npm run build -- --base=/InAlign/LMS/
        working-directory: LMS
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/LMS
          cp -R LMS/dist/. _site/LMS/
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=./LMS/">' > _site/index.html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
